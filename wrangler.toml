"$schema" = "./node_modules/wrangler/config-schema.json"
name = "mkubwa"
main = "./worker.js"
compatibility_date = "2026-05-30"
workers_dev = false

[assets]
directory = "./public"
binding = "ASSETS"

[vars]
ORIGIN = "https://winga-pflp.onrender.com"
ORIGIN_BASE_URL = "https://winga-pflp.onrender.com"

[[routes]]
pattern = "wingamarket.com/*"
zone_name = "wingamarket.com"

[[routes]]
pattern = "www.wingamarket.com/*"
zone_name = "wingamarket.com"
