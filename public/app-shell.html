<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ff6a00">
  <title>Winga - Loading</title>
  <style>
    :root{
      color-scheme: light;
      font-family: "Segoe UI", Arial, sans-serif;
      background:#fff7ed;
      color:#0f172a;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.72), transparent 48%),
        linear-gradient(180deg, #ff8b1f 0%, #ff5a0a 100%);
    }
    .shell{
      width:min(92vw, 430px);
      padding:32px 24px;
      border-radius:32px;
      background:rgba(255,255,255,.94);
      box-shadow:0 28px 60px rgba(15,23,42,.18);
      text-align:center;
    }
    .brand{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      margin-bottom:18px;
    }
    .badge{
      width:64px;
      height:64px;
      border-radius:20px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, #ff9f1c 0%, #ff5a0a 100%);
      color:#fff;
      font-size:2rem;
      font-weight:900;
      box-shadow:0 16px 28px rgba(255,106,0,.24);
    }
    .brand-copy strong{
      display:block;
      font-size:1.35rem;
      letter-spacing:.08em;
    }
    .brand-copy span{
      display:block;
      font-size:.86rem;
      color:#64748b;
      text-transform:uppercase;
      letter-spacing:.12em;
    }
    h1{
      margin:0 0 10px;
      font-size:1.3rem;
    }
    p{
      margin:0;
      line-height:1.6;
      color:#475569;
    }
    .skeleton{
      display:grid;
      gap:12px;
      margin:24px 0 22px;
    }
    .line,
    .card{
      position:relative;
      overflow:hidden;
      border-radius:18px;
      background:#f1f5f9;
    }
    .line::before,
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, transparent 0%, rgba(255,255,255,.75) 50%, transparent 100%);
      transform:translateX(-100%);
      animation:shine 1.25s ease-in-out infinite;
    }
    .line{ height:16px; }
    .line.short{ width:68%; margin:0 auto; }
    .card{ height:112px; }
    button{
      border:0;
      border-radius:999px;
      padding:12px 18px;
      background:#0f172a;
      color:#fff;
      font-size:.95rem;
      font-weight:700;
      cursor:pointer;
    }
    @keyframes shine{
      0%{ transform:translateX(-100%); }
      100%{ transform:translateX(100%); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="brand">
      <div class="badge">W</div>
      <div class="brand-copy">
        <strong>WINGA</strong>
        <span>Shop Fast</span>
      </div>
    </div>
    <h1>Tunafungua Winga...</h1>
    <p>Shell ya app imefika. Tunajaribu kurudisha bidhaa na picha zako bila kuacha screen tupu.</p>
    <div class="skeleton" aria-hidden="true">
      <div class="line"></div>
      <div class="line short"></div>
      <div class="card"></div>
      <div class="card"></div>
    </div>
    <button type="button" onclick="window.location.reload()">Jaribu tena</button>
  </main>
</body>
</html>
