<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Winga - Offline</title>
  <style>
    :root{
      color-scheme: light;
      font-family: "Segoe UI", Arial, sans-serif;
      background:#f8fafc;
      color:#0f172a;
    }
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
    }
    .shell{
      width:min(92vw, 420px);
      padding:32px 24px;
      border-radius:28px;
      background:#fff;
      box-shadow:0 24px 60px rgba(15,23,42,0.12);
      text-align:center;
    }
    .badge{
      width:72px;
      height:72px;
      border-radius:22px;
      margin:0 auto 18px;
      display:grid;
      place-items:center;
      background:#0f172a;
      color:#f8fafc;
      font-size:34px;
      font-weight:800;
    }
    h1{
      margin:0 0 8px;
      font-size:24px;
    }
    p{
      margin:0;
      line-height:1.6;
      color:#475569;
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="badge">W</div>
    <h1>Upo offline</h1>
    <p>Winga itajaribu kutumia shell iliyohifadhiwa. Unganisha tena mtandao ili upate bidhaa mpya na picha mpya.</p>
  </main>
</body>
</html>
