"$schema" = "./node_modules/wrangler/config-schema.json"
name = "winga-session-security-relay"
main = "./cloudflare/session-security-relay.js"
compatibility_date = "2026-05-30"
workers_dev = true

[observability]
enabled = true
head_sampling_rate = 1

[vars]
APP_NAME = "Winga"
RATE_LIMIT_WINDOW_SECONDS = "60"
RATE_LIMIT_MAX_EVENTS = "120"
EMAIL_FROM = "security@wingamarket.com"
SESSION_SECURITY_EMAIL_ENABLED = "false"

[[send_email]]
name = "EMAIL"
allowed_sender_addresses = ["security@wingamarket.com"]

[[kv_namespaces]]
binding = "SESSION_SECURITY_DEDUPE"
id = "717a8635455d49a8b6c1424c40dcc0c1"

[[queues.producers]]
queue = "winga-session-security-events"
binding = "SESSION_SECURITY_QUEUE"

[[queues.consumers]]
queue = "winga-session-security-events"
max_batch_size = 25
max_batch_timeout = 10
max_retries = 8
dead_letter_queue = "winga-session-security-events-dlq"
